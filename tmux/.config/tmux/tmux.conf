##### ===== BASICS ===== #####

# True color + proper terminal
set -g default-terminal "tmux-256color"
set -as terminal-features ",tmux-256color:RGB"

# Faster responsiveness
set -s escape-time 0

# Enable focus events (fixes Neovim autoread)
set -g focus-events on


##### ===== PREFIX ===== #####

# Change prefix to Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix


##### ===== SPLITS ===== #####

# Split panes in current directory
unbind %
unbind '"'

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Optional extra keys
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"


##### ===== PANE NAVIGATION ===== #####

# Vim-style navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt + hjkl (no prefix)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R


##### ===== WINDOW NAVIGATION ===== #####

# Shift + arrows
bind -n S-Left previous-window
bind -n S-Right next-window

# Alt + numbers
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9


##### ===== INDEXING ===== #####

# Start from 1 instead of 0
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on


##### ===== COPY MODE (VIM STYLE) ===== #####

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi C-v send -X rectangle-toggle

# Clipboard (X11)
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "xsel --clipboard --input"

# If using Wayland, replace above with:
# bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"

set -g buffer-limit 1
unbind -T copy-mode-vi MouseDragEnd1Pane


##### ===== PERFORMANCE ===== #####

set -g history-limit 100000


##### ===== UI / STATUS BAR ===== #####

# Colors
set -g status-position top
set -g status-left-length 100

set -g status-style "fg=#D8DEE9,bg=default"
set -g status-left "#[fg=#A3BE8C,bold] #S #[fg=#D8DEE9,nobold]| "
set -g status-right ""

set -g window-status-current-format "#[fg=#88C0D0,bold]  #[underscore]#I:#W"
set -g window-status-format " #I:#W"

set -g message-style "fg=#D8DEE9,bg=default"
set -g mode-style "fg=#3B4252,bg=#81A1C1"

set -g pane-border-style "fg=#3B4252"
set -g pane-active-border-style "fg=#ABB2BF"


##### ===== RELOAD CONFIG ===== #####

unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"


##### ===== MOUSE (OPTIONAL) ===== #####

# Uncomment if you want mouse support
# set -g mouse on


##### ===== TPM (PLUGIN MANAGER) ===== #####

set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/tmux/plugins"

set -g @plugin 'tmux-plugins/tpm'

run "$HOME/.config/tmux/plugins/tpm/tpm"
