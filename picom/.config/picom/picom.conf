#################################
# Backend (IMPORTANT FOR BLUR)
#################################
backend = "glx";
vsync = true;

#################################
# Blur (ENABLED)
#################################
blur:
{
  method = "dual_kawase";
  strength = 7;
};

#################################
# Shadows
#################################
shadow = true;
no-dnd-shadow = true;
no-dock-shadow = true;
clear-shadow = true;

shadow-radius = 12;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-opacity = 0.7;

#################################
# Opacity (Polybar + general)
#################################
inactive-opacity = 0.95;
active-opacity = 1.0;

opacity-rule = [
  "90:class_g = 'Polybar'"
];

#################################
# Fading (smooth animations)
#################################
fading = true;
fade-delta = 5;
fade-in-step = 0.03;
fade-out-step = 0.04;

#################################
# General settings
#################################
mark-wmwin-focused = true;
mark-ovredir-focused = true;

detect-rounded-corners = true;
detect-client-opacity = true;

#################################
# GLX optimizations
#################################
glx-copy-from-front = false;
glx-swap-method = "undefined";

#################################
# Window rules
#################################
wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.75; focus = true; };
  dock = { shadow = false; };
};
