include-file = ~/.config/polybar/theme.ini
[bar/main]
width = 100%
height = 28
bottom = true
background = #cc24273a
foreground = ${colors.text}
radius = 0
padding = 2
module-margin = 2
separator = |
separator-foreground = ${colors.overlay1}
font-0 = "JetBrainsMono Nerd Font:size=14;2"
modules-left = i3
modules-center = date
modules-right = powerprofile cpu memory wlan battery
wm-restack = i3
override-redirect = false
enable-ipc = true
;-------------------------
[module/i3]
type = internal/i3
format = <label-state>
index-sort = true
label-focused = %name%
label-focused-background = ${colors.surface0}
label-focused-foreground = ${colors.blue}
label-focused-padding = 2
label-unfocused = %name%
label-unfocused-foreground = ${colors.overlay1}
label-unfocused-padding = 2
label-visible = %name%
label-visible-foreground = ${colors.mauve}
label-visible-padding = 2
label-urgent = %name%!
label-urgent-foreground = ${colors.red}
label-urgent-padding = 2
;-------------------------
[module/powerprofile]
type = custom/script
exec = ~/.config/polybar/powerprofile.sh
interval = 2
click-left = ~/.config/polybar/perf-toggle.sh
;-------------------------
[module/cpu]
type = internal/cpu
interval = 2
format = <label>
label = CPU %percentage%%
format-foreground = ${colors.peach}
;-------------------------
[module/memory]
type = internal/memory
interval = 2
format = <label>
label = RAM %percentage_used%%
format-foreground = ${colors.green}
;-------------------------
[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %Y-%m-%d %H:%M
label = %date%
format-foreground = ${colors.lavender}
;-------------------------
[module/wlan]
type = internal/network
interface = wlo1
interval = 3
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-connected =  %essid% %signal%%
label-disconnected =  disconnected
format-connected-foreground = ${colors.sky}
format-disconnected-foreground = ${colors.overlay1}
;-------------------------
[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP0
interval = 30
format-charging = <label-charging>
format-discharging = <label-discharging>
label-charging = BAT %percentage%%+
label-discharging = BAT %percentage%%
label-full = BAT full
format-charging-foreground = ${colors.green}
format-discharging-foreground = ${colors.yellow}
format-full-foreground = ${colors.teal}
